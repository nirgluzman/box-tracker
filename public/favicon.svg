<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6d49a"/>
      <stop offset="1" stop-color="#ecc079"/>
    </linearGradient>
  </defs>

  <!-- background (full-bleed for maskable) -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- ground shadow -->
  <ellipse cx="256" cy="402" rx="132" ry="26" fill="#000000" opacity="0.18"/>

  <!-- isometric box -->
  <g stroke="#a9743a" stroke-width="6" stroke-linejoin="round">
    <!-- left face -->
    <path d="M146 205 L256 262 L256 384 L146 327 Z" fill="#d9a85f"/>
    <!-- right face -->
    <path d="M366 205 L256 262 L256 384 L366 327 Z" fill="#c8924a"/>
    <!-- top lid -->
    <path d="M256 148 L366 205 L256 262 L146 205 Z" fill="url(#lid)"/>
  </g>

  <!-- packing tape down the front seam -->
  <path d="M236 252 L256 262 L276 252 L276 372 L256 382 L236 372 Z" fill="#f7eede" opacity="0.92"/>
  <!-- tape across the lid -->
  <path d="M236 168 L256 178 L276 168 L296 178 L276 188 L256 198 L236 188 L216 178 Z"
        fill="#f7eede" opacity="0.7"/>

  <!-- badge: white sticker with a big blue B -->
  <circle cx="256" cy="315" r="80" fill="#ffffff"/>
  <text x="256" y="315" text-anchor="middle" dominant-baseline="central"
        font-family="system-ui, 'Segoe UI', Roboto, sans-serif" font-weight="800"
        font-size="108" fill="#1d4ed8">B</text>
</svg>
